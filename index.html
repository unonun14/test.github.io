<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메가인포 이메일 템플릿 편집기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c-primary: #533afd;
    --c-dark: #1c1e54;
    --c-ink: #0d253d;
    --c-mute: #64748d;
    --c-hairline: #e3e8ee;
    --c-soft: #f6f9fc;
  }
  body { font-family: "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1d2e; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

  /* ── 좌측 편집 패널 ── */
  #editor-panel {
    width: 320px; min-width: 280px; flex-shrink: 0;
    background: #13152a; border-right: 1px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: #0f1023;
  }
  .panel-header h2 { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
  .panel-header p  { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .tab-btn {
    flex: 1; padding: 10px 0; font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.4); background: none; border: none;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s;
  }
  .tab-btn.active { color: var(--c-primary); border-bottom-color: var(--c-primary); }

  .tab-content { display: none; flex: 1; overflow-y: auto; padding: 16px; }
  .tab-content.active { display: block; }
  .tab-content::-webkit-scrollbar { width: 4px; }
  .tab-content::-webkit-scrollbar-track { background: transparent; }
  .tab-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .field-group { margin-bottom: 20px; }
  .field-group label { display: block; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .field-group input[type="text"],
  .field-group textarea,
  .field-group select {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 8px 10px; font-size: 12px; color: #e2e8f0;
    font-family: inherit; outline: none; resize: none; transition: border .2s;
  }
  .field-group input[type="text"]:focus,
  .field-group textarea:focus { border-color: var(--c-primary); }
  .field-group textarea { min-height: 64px; line-height: 1.5; }

  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] { width: 36px; height: 36px; border: none; border-radius: 8px; cursor: pointer; padding: 2px; background: rgba(255,255,255,0.05); }
  .color-row span { font-size: 11px; color: rgba(255,255,255,0.5); }

  .section-title { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 12px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 16px; }

  .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .toggle-row label { font-size: 11px; color: rgba(255,255,255,0.6); }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; transition: .2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  input:checked + .toggle-slider { background: var(--c-primary); }
  input:checked + .toggle-slider:before { transform: translateX(16px); }

  .action-bar {
    padding: 14px 16px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; gap: 8px;
  }
  .btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--c-primary); color: #fff; }
  .btn-primary:hover { background: #4434d4; }
  .btn-secondary { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }

  /* ── 우측 미리보기 ── */
  #preview-panel {
    flex: 1; overflow-y: auto; background: #f0f2f5;
    display: flex; flex-direction: column; align-items: center; padding: 32px 24px; height: 100%;
  }
  .preview-topbar {
    width: 100%; max-width: 640px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 16px;
  }
  .preview-topbar span { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); }
  .device-btns { display: flex; gap: 6px; }
  .device-btn { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 600; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; transition: all .2s; }
  .device-btn.active { background: var(--c-primary); color: #fff; border-color: transparent; }

  #email-frame {
    width: 100%; max-width: 600px;
    height: auto;
    background: #ffffff; border-radius: 16px;
    overflow: visible; box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    transition: max-width .3s ease;
  }
  #email-frame.mobile { max-width: 390px; }

  /* ── 저장 목록 ── */
  #preset-panel {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 14px 16px;
  }
  #preset-panel .section-title { margin-bottom: 10px; }
  .preset-save-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .preset-save-row input {
    flex: 1; padding: 7px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 11px;
  }
  .preset-save-row input::placeholder { color: rgba(255,255,255,0.3); }
  .preset-save-row button {
    padding: 7px 12px; border-radius: 8px; border: none;
    background: var(--c-primary); color: #fff; font-size: 11px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .preset-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
  .preset-item {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.06); border-radius: 8px;
    padding: 8px 10px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    transition: background .15s;
  }
  .preset-item:hover { background: rgba(255,255,255,0.12); }
  .preset-item-name { flex: 1; font-size: 11px; font-weight: 500; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .preset-item-date { font-size: 9px; color: rgba(255,255,255,0.3); white-space: nowrap; }
  .preset-item-del {
    font-size: 11px; color: rgba(255,255,255,0.3); background: none;
    border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px;
    line-height: 1;
  }
  .preset-item-del:hover { color: #ff6b6b; background: rgba(255,107,107,0.15); }
  .preset-empty { font-size: 11px; color: rgba(255,255,255,0.25); text-align: center; padding: 12px 0; }
</style>
</head>
<body>

<!-- ══ 좌측 편집 패널 ══ -->
<div id="editor-panel">
  <div class="panel-header">
    <h2>✉️ 이메일 템플릿 편집기</h2>
    <p>메가인포경영자문그룹</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('content')">내용</button>
    <button class="tab-btn" onclick="switchTab('design')">디자인</button>
    <button class="tab-btn" onclick="switchTab('sections')">섹션</button>
  </div>

  <!-- 내용 탭 -->
  <div id="tab-content" class="tab-content active">
    <div class="section-title">헤더</div>
    <div class="field-group">
      <label>로고 이미지 업로드</label>
      <input type="file" id="f-logo-file" accept="image/*" onchange="handleLogoUpload(event)">
    </div>
    <div class="field-group" id="logo-preview-wrap" style="display:none;">
      <label>업로드된 로고</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <img id="logo-preview-img" src="" style="max-height:36px;max-width:120px;border-radius:4px;background:rgba(255,255,255,0.2);padding:4px;">
        <button onclick="clearLogo()" style="font-size:10px;background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:4px;padding:4px 8px;cursor:pointer;">✕ 제거</button>
      </div>
    </div>
    <div class="field-group">
      <label>로고 텍스트 (이미지 없을 때 표시)</label>
      <input type="text" id="f-logo" value="III. MEGAINFO" oninput="update()">
    </div>
    <div class="field-group">
      <label>상단 태그라인</label>
      <input type="text" id="f-tag" value="Company Newsletter" oninput="update()">
    </div>

    <div class="section-title">히어로</div>
    <div class="field-group">
      <label>Eyebrow (소제목)</label>
      <input type="text" id="f-eyebrow" value="COMPANY NEWSLETTER" oninput="update()">
    </div>
    <div class="field-group">
      <label>메인 제목</label>
      <textarea id="f-title" oninput="update()">제목을 입력하세요</textarea>
    </div>
    <div class="field-group">
      <label>부제목</label>
      <textarea id="f-subtitle" oninput="update()">부제목 또는 인트로 문구를 여기에 입력합니다.</textarea>
    </div>

    <div class="section-title">본문</div>
    <div class="field-group">
      <label>본문 내용</label>
      <textarea id="f-body" rows="4" oninput="update()">본문 내용을 여기에 입력합니다. 주요 내용을 작성해 주세요.</textarea>
    </div>
    <div class="field-group">
      <label>CTA 버튼 텍스트</label>
      <input type="text" id="f-cta" value="자세히 보기 →" oninput="update()">
    </div>
    <div class="field-group">
      <label>CTA 링크 URL</label>
      <input type="text" id="f-cta-url" value="#" oninput="update()">
    </div>

    <div class="section-title">카드 (3개)</div>
    <div class="field-group"><label>카드 1 제목</label><input type="text" id="c1-title" value="항목 제목 1" oninput="update()"></div>
    <div class="field-group"><label>카드 1 내용</label><textarea id="c1-body" oninput="update()">내용을 입력하세요.</textarea></div>
    <div class="field-group"><label>카드 2 제목</label><input type="text" id="c2-title" value="항목 제목 2" oninput="update()"></div>
    <div class="field-group"><label>카드 2 내용</label><textarea id="c2-body" oninput="update()">내용을 입력하세요.</textarea></div>
    <div class="field-group"><label>카드 3 제목</label><input type="text" id="c3-title" value="항목 제목 3" oninput="update()"></div>
    <div class="field-group"><label>카드 3 내용</label><textarea id="c3-body" oninput="update()">내용을 입력하세요.</textarea></div>

    <div class="section-title">다크 배너</div>
    <div class="field-group"><label>배너 제목</label><input type="text" id="f-banner-title" value="강조 내용 제목을 입력하세요" oninput="update()"></div>
    <div class="field-group"><label>배너 내용</label><textarea id="f-banner-body" oninput="update()">강조하고 싶은 내용이나 인용구를 입력합니다.</textarea></div>

    <div class="section-title">푸터</div>
    <div class="field-group"><label>회사명</label><input type="text" id="f-company" value="메가인포경영자문그룹" oninput="update()"></div>
    <div class="field-group"><label>주소 / 연락처</label><textarea id="f-address" oninput="update()">서울특별시 금천구
megainfo@example.com</textarea></div>
    <div class="field-group"><label>수신거부 링크 URL</label><input type="text" id="f-unsub-url" value="#" oninput="update()"></div>
    <div class="field-group"><label>개인정보처리방침 링크 URL</label><input type="text" id="f-privacy-url" value="#" oninput="update()"></div>
    <div class="field-group"><label>저작권 표시 텍스트</label><input type="text" id="f-copyright" value="© 2026 Megainfo. All rights reserved." oninput="update()"></div>
  </div>

  <!-- 디자인 탭 -->
  <div id="tab-design" class="tab-content">
    <div class="section-title">브랜드 색상</div>
    <div class="field-group">
      <label>Primary (버튼, 강조)</label>
      <div class="color-row">
        <input type="color" id="color-primary" value="#533afd" oninput="update()">
        <span id="color-primary-val">#533afd</span>
      </div>
    </div>
    <div class="field-group">
      <label>Dark (헤더 배너)</label>
      <div class="color-row">
        <input type="color" id="color-dark" value="#1c1e54" oninput="update()">
        <span id="color-dark-val">#1c1e54</span>
      </div>
    </div>
    <div class="field-group">
      <label>그라디언트 시작</label>
      <div class="color-row">
        <input type="color" id="grad-start" value="#f5e9d4" oninput="update()">
        <span id="grad-start-val">#f5e9d4</span>
      </div>
    </div>
    <div class="field-group">
      <label>그라디언트 끝</label>
      <div class="color-row">
        <input type="color" id="grad-end" value="#ea2261" oninput="update()">
        <span id="grad-end-val">#ea2261</span>
      </div>
    </div>
    <div class="field-group">
      <label>카드 배경</label>
      <div class="color-row">
        <input type="color" id="color-card" value="#f6f9fc" oninput="update()">
        <span id="color-card-val">#f6f9fc</span>
      </div>
    </div>

    <div class="section-title">타이포그래피</div>
    <div class="field-group">
      <label>제목 크기 (px)</label>
      <input type="text" id="font-title" value="26" oninput="update()">
    </div>
    <div class="field-group">
      <label>본문 크기 (px)</label>
      <input type="text" id="font-body" value="14" oninput="update()">
    </div>
    <div class="field-group">
      <label>헤더 패딩 높이 (px)</label>
      <input type="text" id="header-pad" value="32" oninput="update()">
    </div>

    <div class="section-title">레이아웃</div>
    <div class="field-group">
      <label>최대 너비 (px)</label>
      <input type="text" id="max-width" value="600" oninput="update()">
    </div>
    <div class="field-group">
      <label>테두리 둥글기 (px)</label>
      <input type="text" id="border-radius" value="16" oninput="update()">
    </div>
  </div>

  <!-- 섹션 탭 -->
  <div id="tab-sections" class="tab-content">
    <div class="section-title">섹션 표시/숨김</div>
    <div class="toggle-row">
      <label>헤더 그라디언트</label>
      <label class="toggle"><input type="checkbox" id="show-header" checked onchange="update()"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>히어로 (제목 영역)</label>
      <label class="toggle"><input type="checkbox" id="show-hero" checked onchange="update()"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>본문 텍스트</label>
      <label class="toggle"><input type="checkbox" id="show-body" checked onchange="update()"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>CTA 버튼</label>
      <label class="toggle"><input type="checkbox" id="show-cta" checked onchange="update()"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>카드 3개</label>
      <label class="toggle"><input type="checkbox" id="show-cards" checked onchange="update()"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>다크 배너</label>
      <label class="toggle"><input type="checkbox" id="show-banner" checked onchange="update()"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>푸터</label>
      <label class="toggle"><input type="checkbox" id="show-footer" checked onchange="update()"><span class="toggle-slider"></span></label>
    </div>

    <div class="section-title">카드 레이블 & 아이콘</div>
    <div class="field-group"><label>카드 1 레이블</label><input type="text" id="c1-label" value="ITEM 01" oninput="update()"></div>
    <div class="field-group"><label>카드 1 아이콘 (이모지)</label><input type="text" id="c1-icon" value="✅" oninput="update()" style="font-size:16px;"></div>
    <div class="field-group"><label>카드 2 레이블</label><input type="text" id="c2-label" value="ITEM 02" oninput="update()"></div>
    <div class="field-group"><label>카드 2 아이콘 (이모지)</label><input type="text" id="c2-icon" value="📊" oninput="update()" style="font-size:16px;"></div>
    <div class="field-group"><label>카드 3 레이블</label><input type="text" id="c3-label" value="ITEM 03" oninput="update()"></div>
    <div class="field-group"><label>카드 3 아이콘 (이모지)</label><input type="text" id="c3-icon" value="🚀" oninput="update()" style="font-size:16px;"></div>

    <div class="section-title">카드 헤드라인</div>
    <div class="field-group"><label>섹션 제목 텍스트</label><input type="text" id="cards-headline" value="KEY HIGHLIGHTS" oninput="update()"></div>
  </div>

  <!-- 저장 목록 -->
  <div id="preset-panel">
    <div class="section-title">💾 세팅 저장 목록</div>
    <div class="preset-save-row">
      <input type="text" id="preset-name-input" placeholder="세팅 이름 입력...">
      <button onclick="savePreset()">저장</button>
    </div>
    <div id="preset-list" class="preset-list">
      <div class="preset-empty">저장된 세팅이 없습니다.</div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-secondary" onclick="copyHTML()">📋 HTML 복사</button>
    <button class="btn btn-primary" onclick="downloadHTML()">⬇ 다운로드</button>
  </div>
</div>

<!-- ══ 우측 미리보기 ══ -->
<div id="preview-panel">
  <div class="preview-topbar">
    <span>LIVE PREVIEW</span>
    <div class="device-btns">
      <button class="device-btn" onclick="setDevice('desktop')">데스크톱</button>
      <button class="device-btn active" onclick="setDevice('mobile')">모바일</button>
    </div>
  </div>
  <div id="email-frame" class="mobile"></div>
</div>

<script>
function v(id){ return document.getElementById(id); }
function val(id){ const el=v(id); if(!el)return''; return el.value||''; }
function chk(id){ const el=v(id); if(!el)return true; return el.checked; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function switchTab(name){
  ['content','design','sections'].forEach(t=>{
    v('tab-'+t).classList.toggle('active', t===name);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['content','design','sections'][i]===name);
  });
}

function setDevice(d){
  document.querySelectorAll('.device-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const frame = v('email-frame');
  frame.classList.toggle('mobile', d==='mobile');
  applyMobileCardStyles(d==='mobile');
}

function applyMobileCardStyles(isMobile){
  const frame = v('email-frame');
  if(!frame) return;
  frame.querySelectorAll('.card-td').forEach((td,i) => {
    if(isMobile){
      td.style.display = 'block';
      td.style.width = '100%';
      td.style.paddingRight = '0';
      td.style.marginBottom = '10px';
    } else {
      td.style.display = '';
      td.style.width = '31%';
      td.style.paddingRight = i < 2 ? '8px' : '';
      td.style.marginBottom = '';
    }
  });
  frame.querySelectorAll('.card-icon').forEach(icon => {
    if(isMobile){
      icon.style.width = '36px';
      icon.style.height = '36px';
      icon.style.fontSize = '18px';
      icon.style.lineHeight = '36px';
    } else {
      icon.style.width = '40px';
      icon.style.height = '40px';
      icon.style.fontSize = '20px';

const PRESET_KEY = 'megainfo_presets';
const SAVE_IDS = ['f-logo','f-tag','f-eyebrow','f-title','f-subtitle','f-body','f-cta','f-cta-url',
  'c1-title','c1-body','c2-title','c2-body','c3-title','c3-body',
  'f-banner-title','f-banner-body','f-company','f-address','f-unsub-url','f-privacy-url','f-copyright',
  'color-primary','color-dark','grad-start','grad-end','color-card',
  'font-title','font-body','header-pad','max-width','border-radius',
  'show-header','show-hero','show-body','show-cta','show-cards','show-banner','show-footer',
  'c1-label','c1-icon','c2-label','c2-icon','c3-label','c3-icon','cards-headline'];

function getPresets(){ try{ return JSON.parse(localStorage.getItem(PRESET_KEY)||'[]'); }catch(e){ return []; } }
function setPresets(p){ localStorage.setItem(PRESET_KEY, JSON.stringify(p)); }

function savePreset(){
  const nameEl = v('preset-name-input');
  const name = nameEl.value.trim();
  if(!name){ nameEl.focus(); return; }
  const data = {};
  SAVE_IDS.forEach(id => {
    const el = v(id);
    if(!el) return;
    data[id] = el.type === 'checkbox' ? el.checked : el.value;
  });
  if(window._logoDataURL) data['__logoDataURL'] = window._logoDataURL;
  const presets = getPresets();
  const now = new Date();
  const dateStr = now.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  presets.unshift({ name, data, date: dateStr });
  setPresets(presets);
  nameEl.value = '';
  renderPresets();
}

function loadPreset(idx){
  const presets = getPresets();
  const p = presets[idx];
  if(!p) return;
  SAVE_IDS.forEach(id => {
    const el = v(id);
    if(!el || !(id in p.data)) return;
    if(el.type === 'checkbox') el.checked = p.data[id];
    else el.value = p.data[id];
  });
  if(p.data['__logoDataURL']){
    window._logoDataURL = p.data['__logoDataURL'];
    const preview = v('logo-preview-img');
    const wrap = v('logo-preview-wrap');
    if(preview) preview.src = window._logoDataURL;
    if(wrap) wrap.style.display = 'block';
  } else {
    window._logoDataURL = null;
    const wrap = v('logo-preview-wrap');
    if(wrap) wrap.style.display = 'none';
  }
  update();
}

function deletePreset(idx, e){
  e.stopPropagation();
  const presets = getPresets();
  presets.splice(idx, 1);
  setPresets(presets);
  renderPresets();
}

function renderPresets(){
  const list = v('preset-list');
  if(!list) return;
  const presets = getPresets();
  if(!presets.length){
    list.innerHTML = '<div class="preset-empty">저장된 세팅이 없습니다.</div>';
    return;
  }
  list.innerHTML = presets.map((p,i) => `
    <div class="preset-item" onclick="loadPreset(${i})">
      <span class="preset-item-name">📄 ${p.name}</span>
      <span class="preset-item-date">${p.date}</span>
      <button class="preset-item-del" onclick="deletePreset(${i}, event)" title="삭제">✕</button>
    </div>
  `).join('');
}

function handleLogoUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    window._logoDataURL = ev.target.result;
    const preview = document.getElementById('logo-preview-img');
    const wrap = document.getElementById('logo-preview-wrap');
    if(preview) preview.src = ev.target.result;
    if(wrap) wrap.style.display = 'block';
    update();
  };
  reader.readAsDataURL(file);
}

function clearLogo(){
  window._logoDataURL = null;
  const wrap = document.getElementById('logo-preview-wrap');
  const fileInput = document.getElementById('f-logo-file');
  const preview = document.getElementById('logo-preview-img');
  if(wrap) wrap.style.display = 'none';
  if(fileInput) fileInput.value = '';
  if(preview) preview.src = '';
  update();
}

function update(){
  // 색상 값 표시 업데이트

  ['start','end'].forEach(k=>{
    const el=v('grad-'+k); if(el) { const span=v('grad-'+k+'-val'); if(span) span.textContent=el.value; }

function copyHTML(){
  const frame = v('email-frame');
  const btn = document.querySelector('.btn-secondary');
  const orig = btn.textContent;

  try {
    const selection = window.getSelection();
    selection.removeAllRanges();

    // <style> 태그 제외하고 첫 번째 table만 선택
    const table = frame.querySelector('table');
    if(!table) throw new Error('no table');

    const range = document.createRange();
    range.selectNodeContents(table);
    selection.addRange(range);

    document.execCommand('copy');
    selection.removeAllRanges();

    btn.textContent = '✅ 복사됨!';
    setTimeout(() => btn.textContent = orig, 2000);
  } catch(e) {
    navigator.clipboard.writeText(getFullHTML()).then(() => {
      btn.textContent = '✅ 복사됨!';
      setTimeout(() => btn.textContent = orig, 2000);
    });
  }
}
